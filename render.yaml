services:
  - type: web
    name: sage-compliance-assistant
    runtime: docker
    dockerfilePath: ./app/Dockerfile
    dockerContext: ./app
    plan: free
    envVars:
      - key: OPENAI_API_KEY
        sync: false          # set manually in Render dashboard — never commit the key
    autoDeploy: false        # deploy manually to control when updates go live
